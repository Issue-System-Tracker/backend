server:
  port: 8080

# Локальные файлы вложений (картинки в описании). Docker: смонтировать том на этот путь.
app:
  upload:
    dir: ${APP_UPLOAD_DIR:data/uploads}

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Схема уже создана Hibernate'ом, таблицы flyway не было — без baseline Flyway падает.
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: update

logging:
  file:
    name: logs/issuetracker.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
  level:
    com.t1.officebooking: INFO
    org.springframework.web: WARN
    org.hibernate: ERROR
